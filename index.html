<!DOCTYPE html>
<html lang="it" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centro di Controllo — Studio</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts: Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Custom Configuration Tailwind -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            amber: {
              50: '#fdf8f2',
              100: '#fbeee0',
              200: '#f6d9be',
              300: '#efbc91',
              400: '#e5975f',
              500: '#dc7b37',
              600: '#cd6027',
              700: '#aa481e',
              800: '#883a1c',
              900: '#6f311a',
              950: '#3c170c',
            },
            studio: {
              bgLight: '#FAF8F5',
              bgDark: '#0C0A09',
              cardLight: '#FFFFFF',
              cardDark: '#141210',
              borderLight: '#EAE6DF',
              borderDark: '#26211C',
              accent: '#965604',
              accentHover: '#764003',
              accentLight: '#F5E6D3',
              textDarkPrim: '#EAE6DF',
              textDarkSec: '#B8B0A5',
              textLightPrim: '#1C1917',
              textLightSec: '#57534E',
            }
          },
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    /* Transizioni fluide */
    .transition-all-300 {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Scrollbar personalizzata */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    .dark ::-webkit-scrollbar-thumb {
      background: #2D2822;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb {
      background: #E5DCD3;
      border-radius: 3px;
    }
    
    /* Animazioni per la comparsa delle viste */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }
  </style>
</head>
<body class="bg-studio-bgLight dark:bg-studio-bgDark text-studio-textLightPrim dark:text-studio-textDarkPrim font-sans transition-colors duration-300 min-h-screen flex flex-col selection:bg-studio-accent selection:text-white">

  <!-- ================= TOP NAVBAR ================= -->
  <header class="bg-[#52361B] text-white border-b border-[#6E4926] px-6 py-4 flex items-center justify-between sticky top-0 z-40 shadow-md">
    <div class="flex items-center space-x-3">
      <!-- Icona del Centro di Controllo -->
      <div class="bg-studio-accent p-2 rounded-lg text-white shadow-inner flex items-center justify-center">
        <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
      </div>
      <h1 class="text-xl font-bold tracking-tight">Centro di Controllo <span class="font-light text-[#EAE6DF]">— Studio</span></h1>
    </div>

    <!-- Navigazione Tab Principale -->
    <nav class="hidden md:flex items-center space-x-1">
      <button onclick="switchTab('dashboard')" id="tab-dashboard" class="px-4 py-2 rounded-lg text-sm font-medium hover:bg-[#654322] hover:text-white transition-all duration-200 border-b-2 border-transparent">
        Dashboard
      </button>
      <button onclick="switchTab('calendario')" id="tab-calendario" class="px-4 py-2 rounded-lg text-sm font-medium hover:bg-[#654322] hover:text-white transition-all duration-200 border-b-2 border-transparent">
        Calendario
      </button>
      <button onclick="switchTab('risorse')" id="tab-risorse" class="px-4 py-2 rounded-lg text-sm font-medium hover:bg-[#654322] hover:text-white transition-all duration-200 border-b-2 border-transparent">
        Risorse
      </button>
      <button onclick="switchTab('archivio')" id="tab-archivio" class="px-4 py-2 rounded-lg text-sm font-medium hover:bg-[#654322] hover:text-white transition-all duration-200 border-b-2 border-transparent">
        Archivio
      </button>
    </nav>

    <!-- Pulsanti di Servizio e Profilo -->
    <div class="flex items-center space-x-4">
      <!-- Search Input Globale -->
      <div class="relative hidden sm:block">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-stone-300">
          <i data-lucide="search" class="w-4 h-4"></i>
        </span>
        <input type="text" id="global-search" oninput="handleGlobalSearch(event)" placeholder="Cerca lezioni..." 
               class="bg-[#654322] text-[#FAF8F5] placeholder-stone-300 text-xs rounded-lg pl-9 pr-4 py-2 w-48 focus:outline-none focus:ring-1 focus:ring-amber-400 border border-[#78512C] transition-all-300 focus:w-60">
      </div>

      <!-- Theme Switcher -->
      <button onclick="toggleTheme()" class="p-2 rounded-lg bg-[#654322] hover:bg-[#78512C] text-stone-100 transition-colors duration-200" title="Cambia Tema">
        <i data-lucide="sun" id="theme-icon-light" class="w-4.5 h-4.5 hidden"></i>
        <i data-lucide="moon" id="theme-icon-dark" class="w-4.5 h-4.5"></i>
      </button>

      <!-- Notifiche (Simulate) -->
      <button class="p-2 rounded-lg bg-[#654322] hover:bg-[#78512C] text-stone-100 transition-colors duration-200 relative" onclick="showNotificationAlert()">
        <i data-lucide="bell" class="w-4.5 h-4.5"></i>
        <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-amber-400 rounded-full animate-ping"></span>
      </button>

      <!-- Profilo Studente -->
      <div class="flex items-center space-x-3 pl-2 border-l border-[#654322]">
        <div class="w-8 h-8 rounded-full bg-amber-200 border-2 border-amber-400 flex items-center justify-center font-bold text-[#52361B] shadow">
          S
        </div>
        <div class="hidden lg:block text-left leading-none">
          <div class="text-xs font-semibold text-white">Studente</div>
          <div class="text-[10px] text-amber-200 font-medium">Sessione Attiva</div>
        </div>
      </div>
    </div>
  </header>

  <!-- ================= PRINCIPALE LAYOUT GRID ================= -->
  <div class="flex-1 flex flex-col md:flex-row overflow-x-hidden">
    
    <!-- ================= LEFT SIDEBAR ================= -->
    <aside class="w-full md:w-64 bg-studio-cardLight dark:bg-studio-cardDark border-b md:border-b-0 md:border-r border-studio-borderLight dark:border-studio-borderDark p-5 flex flex-col justify-between shrink-0 transition-colors duration-300">
      <div class="space-y-6">
        <!-- Profilo Widget -->
        <div class="bg-studio-bgLight dark:bg-studio-bgDark border border-studio-borderLight dark:border-studio-borderDark rounded-xl p-4 flex items-center space-x-3.5 transition-colors duration-300">
          <div class="relative">
            <!-- Profilo SVG Personalizzato -->
            <div class="w-11 h-11 rounded-full bg-studio-accent/15 dark:bg-studio-accent/20 border border-studio-accent/30 flex items-center justify-center text-studio-accent shadow-sm overflow-hidden">
              <i data-lucide="user" class="w-6 h-6"></i>
            </div>
            <div class="absolute bottom-0 right-0 w-3 h-3 bg-emerald-500 rounded-full border-2 border-studio-cardLight dark:border-studio-cardDark"></div>
          </div>
          <div>
            <h4 class="text-sm font-bold text-studio-textLightPrim dark:text-studio-textDarkPrim">Studente</h4>
            <p class="text-[11px] text-studio-textLightSec dark:text-studio-textDarkSec font-medium flex items-center gap-1">
              <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
              Sessione Attiva
            </p>
          </div>
        </div>

        <!-- Menu Navigazione Laterale -->
        <div class="space-y-1">
          <p class="text-[10px] font-bold text-studio-textLightSec dark:text-studio-textDarkSec uppercase tracking-wider px-3 mb-2">Monitoraggio</p>
          
          <button onclick="switchTab('dashboard')" id="side-dashboard" class="w-full flex items-center space-x-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group text-studio-textLightSec dark:text-studio-textDarkSec hover:bg-studio-bgLight dark:hover:bg-studio-bgDark hover:text-studio-accent">
            <i data-lucide="home" class="w-4.5 h-4.5 group-hover:scale-110 transition-transform"></i>
            <span>Home</span>
          </button>
          
          <button onclick="switchTab('calendario')" id="side-calendario" class="w-full flex items-center space-x-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group text-studio-textLightSec dark:text-studio-textDarkSec hover:bg-studio-bgLight dark:hover:bg-studio-bgDark hover:text-studio-accent">
            <i data-lucide="calendar" class="w-4.5 h-4.5 group-hover:scale-110 transition-transform"></i>
            <span>Calendario</span>
          </button>
          
          <button onclick="switchTab('archivio')" id="side-archivio" class="w-full flex items-center space-x-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group text-studio-textLightSec dark:text-studio-textDarkSec hover:bg-studio-bgLight dark:hover:bg-studio-bgDark hover:text-studio-accent">
            <i data-lucide="archive" class="w-4.5 h-4.5 group-hover:scale-110 transition-transform"></i>
            <span>Lezioni</span>
          </button>

          <button onclick="simulateEserciziTab()" id="side-esercizi" class="w-full flex items-center space-x-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group text-studio-textLightSec dark:text-studio-textDarkSec hover:bg-studio-bgLight dark:hover:bg-studio-bgDark hover:text-studio-accent">
            <i data-lucide="edit-3" class="w-4.5 h-4.5 group-hover:scale-110 transition-transform"></i>
            <span>Esercizi</span>
          </button>
          
          <button onclick="switchTab('risorse')" id="side-risorse" class="w-full flex items-center space-x-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group text-studio-textLightSec dark:text-studio-textDarkSec hover:bg-studio-bgLight dark:hover:bg-studio-bgDark hover:text-studio-accent">
            <i data-lucide="folder-open" class="w-4.5 h-4.5 group-hover:scale-110 transition-transform"></i>
            <span>Materiali</span>
          </button>
          
          <button onclick="showSettingsAlert()" id="side-impostazioni" class="w-full flex items-center space-x-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group text-studio-textLightSec dark:text-studio-textDarkSec hover:bg-studio-bgLight dark:hover:bg-studio-bgDark hover:text-studio-accent">
            <i data-lucide="settings" class="w-4.5 h-4.5 group-hover:scale-110 transition-transform"></i>
            <span>Impostazioni</span>
          </button>
        </div>
      </div>

      <!-- Bottone "Aggiungi Lezione" in fondo alla sidebar -->
      <div class="mt-8 pt-4 border-t border-studio-borderLight dark:border-studio-borderDark">
        <button onclick="openModal()" class="w-full py-3 bg-studio-accent hover:bg-studio-accentHover text-white font-semibold text-xs rounded-xl shadow-lg hover:shadow-xl transition-all-300 flex items-center justify-center space-x-2 transform hover:-translate-y-0.5 active:translate-y-0">
          <i data-lucide="plus" class="w-4 h-4"></i>
          <span>Aggiungi Lezione</span>
        </button>
      </div>
    </aside>

    <!-- ================= CONTENITORE VISTE DINAMICHE ================= -->
    <main id="main-content" class="flex-1 p-6 md:p-8 overflow-y-auto max-w-7xl mx-auto w-full">
      <!-- Le viste verranno inserite dinamicamente qui dal motore JS -->
    </main>

  </div>

  <!-- ================= MODALE INSERIMENTO / MODIFICA LEZIONE ================= -->
  <div id="modal-container" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden transition-opacity duration-300 opacity-0">
    <div class="bg-studio-cardLight dark:bg-studio-cardDark border border-studio-borderLight dark:border-studio-borderDark rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl transition-all duration-300 transform scale-95" onclick="event.stopPropagation()">
      
      <!-- Intestazione Modale -->
      <div class="flex items-center justify-between px-6 py-4 border-b border-studio-borderLight dark:border-studio-borderDark bg-studio-bgLight dark:bg-studio-bgDark rounded-t-2xl">
        <div class="flex items-center space-x-2">
          <div class="p-1.5 rounded-lg bg-studio-accent/15 text-studio-accent">
            <i data-lucide="book-open" class="w-4.5 h-4.5" id="modal-icon"></i>
          </div>
          <h3 id="modal-title" class="text-base font-bold text-studio-textLightPrim dark:text-studio-textDarkPrim">Registra Nuova Lezione</h3>
        </div>
        <button onclick="closeModal()" class="p-1.5 rounded-lg hover:bg-studio-borderLight dark:hover:bg-studio-borderDark text-studio-textLightSec dark:text-studio-textDarkSec transition-colors duration-200">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>

      <!-- Form Modale -->
      <form id="activity-form" onsubmit="saveActivity(event)" class="p-6 space-y-5">
        <input type="hidden" id="activity-id">
        
        <!-- Riga 1: Titolo / Nome Argomento -->
        <div class="space-y-1.5">
          <label for="topic" class="text-xs font-bold text-studio-textLightSec dark:text-studio-textDarkSec uppercase tracking-wider">Nome Argomento <span class="text-red-500">*</span></label>
          <input type="text" id="topic" required placeholder="Esempio: Flexbox & Grid Masterclass" 
                 class="w-full bg-studio-bgLight dark:bg-studio-bgDark border border-studio-borderLight dark:border-studio-borderDark rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-studio-accent/30 focus:border-studio-accent transition-all-300 text-studio-textLightPrim dark:text-studio-textDarkPrim">
        </div>

        <!-- Riga 2: Data e Categoria -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="space-y-1.5">
            <label for="date" class="text-xs font-bold text-studio-textLightSec dark:text-studio-textDarkSec uppercase tracking-wider">Data Sessione <span class="text-red-500">*</span></label>
            <input type="date" id="date" required 
                   class="w-full bg-studio-bgLight dark:bg-studio-bgDark border border-studio-borderLight dark:border-studio-borderDark rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-studio-accent/30 focus:border-studio-accent transition-all-300 text-studio-textLightPrim dark:text-studio-textDarkPrim">
          </div>
          <div class="space-y-1.5">
            <label for="category" class="text-xs font-bold text-studio-textLightSec dark:text-studio-textDarkSec uppercase tracking-wider">Categoria Disciplinare <span class="text-red-500">*</span></label>
            <select id="category" required 
                    class="w-full bg-studio-bgLight dark:bg-studio-bgDark border border-studio-borderLight dark:border-studio-borderDark rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-studio-accent/30 focus:border-studio-accent transition-all-300 text-studio-textLightPrim dark:text-studio-textDarkPrim">
              <option value="HTML">HTML</option>
              <option value="CSS">CSS</option>
              <option value="JS">JavaScript (JS)</option>
              <option value="AI-web-development">AI Web Development</option>
            </select>
          </div>
        </div>

        <!-- Riga 3: Tipo Attività (Toggles) -->
        <div class="bg-studio-bgLight dark:bg-studio-bgDark border border-studio-borderLight dark:border-studio-borderDark rounded-xl p-4 space-y-3">
          <span class="text-xs font-bold text-studio-textLightSec dark:text-studio-textDarkSec uppercase tracking-wider block">Tipo Attività</span>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <!-- Toggle 1: Svolta Lezione -->
            <label class="flex items-center justify-between p-3 bg-studio-cardLight dark:bg-studio-cardDark border border-studio-borderLight dark:border-studio-borderDark rounded-xl cursor-pointer hover:border-studio-accent/40 transition-colors">
              <div class="flex items-center space-x-3">
                <div class="p-1.5 rounded-lg bg-amber-500/10 text-amber-500 dark:text-amber-400">
                  <i data-lucide="book-open" class="w-4 h-4"></i>
                </div>
                <div>
                  <span class="text-sm font-semibold block">Svolta Lezione</span>
                  <span class="text-[10px] text-studio-textLightSec dark:text-studio-textDarkSec font-medium">Sessione di studio o lezione completata</span>
                </div>
              </div>
              <input type="checkbox" id="isLessonDone" class="sr-only peer">
              <div class="w-10 h-6 bg-stone-300 dark:bg-stone-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:height-5 after:width-5 after:transition-all after:w-5 after:h-5 dark:after:border-stone-600 peer-checked:bg-studio-accent relative after:transition-transform"></div>
            </label>

            <!-- Toggle 2: Caricato Compito -->
            <label class="flex items-center justify-between p-3 bg-studio-cardLight dark:bg-studio-cardDark border border-studio-borderLight dark:border-studio-borderDark rounded-xl cursor-pointer hover:border-studio-accent/40 transition-colors">
              <div class="flex items-center space-x-3">
                <div class="p-1.5 rounded-lg bg-yellow-500/10 text-yellow-600 dark:text-yellow-400">
                  <i data-lucide="check-square" class="w-4 h-4"></i>
                </div>
                <div>
                  <span class="text-sm font-semibold block">Caricato Compito</span>
                  <span class="text-[10px] text-studio-textLightSec dark:text-studio-textDarkSec font-medium">Esercizio o homework caricato</span>
                </div>
              </div>
              <input type="checkbox" id="isHomeworkUploaded" class="sr-only peer">
              <div class="w-10 h-6 bg-stone-300 dark:bg-stone-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:height-5 after:width-5 after:transition-all after:w-5 after:h-5 dark:after:border-stone-600 peer-checked:bg-studio-accent relative after:transition-transform"></div>
            </label>
          </div>
        </div>

        <!-- Riga 4: Link Piattaforma e Note -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="space-y-1.5">
            <label for="platformLink" class="text-xs font-bold text-studio-textLightSec dark:text-studio-textDarkSec uppercase tracking-wider">Link Piattaforma (URL)</label>
            <input type="url" id="platformLink" placeholder="https://piattaforma.it/lezione" 
                   class="w-full bg-studio-bgLight dark:bg-studio-bgDark border border-studio-borderLight dark:border-studio-borderDark rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-studio-accent/30 focus:border-studio-accent transition-all-300 text-studio-textLightPrim dark:text-studio-textDarkPrim">
          </div>
          <div class="space-y-1.5">
            <label for="notes" class="text-xs font-bold text-studio-textLightSec dark:text-studio-textDarkSec uppercase tracking-wider">Note Rapide</label>
            <input type="text" id="notes" placeholder="Note rapide o annotazioni..." 
                   class="w-full bg-studio-bgLight dark:bg-studio-bgDark border border-studio-borderLight dark:border-studio-borderDark rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-studio-accent/30 focus:border-studio-accent transition-all-300 text-studio-textLightPrim dark:text-studio-textDarkPrim">
          </div>
        </div>

        <!-- Riga 4b: Upload Materiale Didattico (File/Slide) -->
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-studio-textLightSec dark:text-studio-textDarkSec uppercase tracking-wider block">Materiale Didattico (Slide o File)</label>
          <div id="file-dropzone" class="border-2 border-dashed border-studio-borderLight dark:border-studio-borderDark rounded-xl p-4 text-center cursor-pointer hover:border-studio-accent/40 transition-colors bg-studio-bgLight/20 dark:bg-studio-bgDark/20 relative group">
            <input type="file" id="file-input" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="handleFileSelection(event)">
            <div class="space-y-1.5" id="dropzone-prompt">
              <i data-lucide="cloud-upload" class="w-7 h-7 mx-auto text-studio-textLightSec/60 dark:text-studio-textDarkSec/50 group-hover:scale-110 transition-transform"></i>
              <p class="text-xs font-bold text-studio-textLightPrim dark:text-studio-textDarkPrim">Trascina qui il tuo file o clicca per sfogliare</p>
              <p class="text-[10px] text-studio-textLightSec dark:text-studio-textDarkSec font-semibold">Slide, PDF, Codice o Immagini (max 2MB)</p>
            </div>
            <!-- Anteprima File -->
            <div id="file-preview" class="hidden flex items-center justify-between p-2.5 bg-studio-cardLight dark:bg-studio-cardDark border border-studio-borderLight dark:border-studio-borderDark rounded-lg relative z-10" onclick="event.stopPropagation()">
              <div class="flex items-center space-x-2.5 truncate">
                <div class="w-8.5 h-8.5 rounded-lg bg-studio-accentLight dark:bg-[#2C2117] text-studio-accent dark:text-[#E2C7A8] flex items-center justify-center shrink-0">
                  <i data-lucide="file-text" class="w-4 h-4" id="file-preview-icon"></i>
                </div>
                <div class="text-left truncate leading-none">
                  <span id="file-preview-name" class="text-xs font-bold text-studio-textLightPrim dark:text-studio-textDarkPrim block truncate max-w-sm">nome_file.pdf</span>
                  <span id="file-preview-size" class="text-[9px] text-studio-textLightSec dark:text-studio-textDarkSec font-bold mt-1 block">120 KB</span>
                </div>
              </div>
              <button type="button" onclick="removeAttachedFile(event)" class="p-1.5 rounded hover:bg-red-500/10 text-red-500" title="Rimuovi"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>
          </div>
        </div>

        <!-- Riga 5: Descrizione -->
        <div class="space-y-1.5">
          <label for="description" class="text-xs font-bold text-studio-textLightSec dark:text-studio-textDarkSec uppercase tracking-wider">Descrizione Argomenti Trattati</label>
          <textarea id="description" rows="3" placeholder="Scrivi una breve descrizione dei concetti affrontati in questa sessione..." 
                    class="w-full bg-studio-bgLight dark:bg-studio-bgDark border border-studio-borderLight dark:border-studio-borderDark rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-studio-accent/30 focus:border-studio-accent transition-all-300 text-studio-textLightPrim dark:text-studio-textDarkPrim resize-none"></textarea>
        </div>

        <!-- Riga 6: Tag e Autovalutazione -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 items-end">

    function initAppState() {
      // Inizializza il localStorage se vuoto
      const savedActivities = localStorage.getItem('studio_activities');
      if (savedActivities) {

      } else {

        localStorage.setItem('studio_activities', JSON.stringify(APP_STATE.activities));
      }
      
      // Inizializza il tema salvato o usa Dark Mode di default
      const savedTheme = localStorage.getItem('studio_theme');
      if (savedTheme) {
        APP_STATE.theme = savedTheme;
      } else {
        APP_STATE.theme = 'dark';
      }
      applyTheme();
    }

    function saveStateToLocalStorage() {
      localStorage.setItem('studio_activities', JSON.stringify(APP_STATE.activities));

    // ================= GESTORE TEMI (LIGHT / DARK) =================
    function toggleTheme() {
      APP_STATE.theme = APP_STATE.theme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('studio_theme', APP_STATE.theme);
      applyTheme();
      showToast(`Tema ${APP_STATE.theme === 'dark' ? 'Scuro' : 'Chiaro'} attivato!`);
      // Ri-renderizza la vista corrente per applicare eventuali classi condizionali
      renderActiveTab();
    }

    function applyTheme() {
      const htmlEl = document.documentElement;
      const lightIcon = document.getElementById('theme-icon-light');
      const darkIcon = document.getElementById('theme-icon-dark');
      
      if (APP_STATE.theme === 'dark') {
        htmlEl.classList.add('dark');
        lightIcon.classList.remove('hidden');
        darkIcon.classList.add('hidden');
      } else {
        htmlEl.classList.remove('dark');
        lightIcon.classList.add('hidden');
        darkIcon.classList.remove('hidden');
      }
    }

        const sideBtn = document.getElementById(`side-${t}`);
        
        if (t === tabId) {
          // Top Nav Active Style
          if (btn) {
            btn.classList.add('bg-[#654322]', 'text-white', 'border-[#FAF8F5]');
            btn.classList.remove('border-transparent');

          // Sidebar Active Style

            sideBtn.classList.remove('text-studio-textLightSec', 'dark:text-studio-textDarkSec');
            sideBtn.classList.add('bg-studio-accent', 'text-white', 'shadow-md');

            btn.classList.remove('bg-[#654322]', 'text-white', 'border-[#FAF8F5]');

      const parts = dateStr.split('-');
      if (parts.length !== 3) return dateStr;
      const d = new Date(parts[0], parts[1] - 1, parts[2]);
      return `${d.getDate()} ${MONTH_NAMES[d.getMonth()].substring(0, 3)} ${d.getFullYear()}`;
    }

    function handleGlobalSearch(e) {
      const query = e.target.value.toLowerCase();
      APP_STATE.filters.searchQuery = query;
      
      // Se siamo nell'archivio, esegui il rendering aggiornato dell'archivio
      if (APP_STATE.activeTab === 'archivio') {
        const tableBody = document.getElementById('archive-table-body');
        if (tableBody) {
          renderArchiveTableRows();
        }
      } else {
        // Altrimenti reindirizza all'archivio con il filtro applicato
        switchTab('archivio');
        const searchInput = document.getElementById('search-archive-input');
        if (searchInput) searchInput.value = query;
      }
    }

    function navigateMonth(direction) {

      renderCalendar(container);

    function selectDate(year, month, day) {
      APP_STATE.selectedDate = new Date(year, month, day);
      
      // Aggiorna classe attiva della griglia
      const daysCells = document.querySelectorAll('.calendar-day-cell');
      daysCells.forEach(cell => {
        cell.classList.remove('bg-studio-accent', 'text-white', 'shadow-md', 'scale-105');
        cell.classList.add('bg-studio-cardLight', 'dark:bg-studio-cardDark', 'text-studio-textLightPrim', 'dark:text-studio-textDarkPrim');
      });

      const activeCell = document.getElementById(`cal-cell-${year}-${month}-${day}`);
      if (activeCell) {
        activeCell.classList.remove('bg-studio-cardLight', 'dark:bg-studio-cardDark', 'text-studio-textLightPrim', 'dark:text-studio-textDarkPrim');
        activeCell.classList.add('bg-studio-accent', 'text-white', 'shadow-md', 'scale-105');
      }

      // Aggiorna il pannello laterale destro
      renderDayDetailsPanel();
    }

    function renderCalendar(container) {
      const year = APP_STATE.currentCalendarMonth.getFullYear();
      const month = APP_STATE.currentCalendarMonth.getMonth();

      // Primo giorno del mese
      const firstDayIndex = new Date(year, month, 1).getDay(); // 0 is Sun, 1 is Mon
      // Correzione index per iniziare da Lunedì (LUN=0, DOM=6)
      const adjustedFirstDayIndex = firstDayIndex === 0 ? 6 : firstDayIndex - 1;

      // Numero di giorni nel mese corrente e nel mese precedente
      const totalDaysInMonth = new Date(year, month + 1, 0).getDate();
      const totalDaysInPrevMonth = new Date(year, month, 0).getDate();

      const monthName = MONTH_NAMES[month];
      
      // Calcolo sessioni e compiti di questo mese
      const monthActivities = APP_STATE.activities.filter(a => {
        const parts = a.date.split('-');
        return parseInt(parts[0]) === year && parseInt(parts[1]) - 1 === month;
      });
      const compitiMese = monthActivities.filter(a => a.isHomeworkUploaded).length;
      const lezioniMese = monthActivities.filter(a => a.isLessonDone).length;

      container.innerHTML = `
        <div class="animate-fade-in space-y-6">
          <!-- Riga Intestazione Calendario -->
          <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
              <h2 class="text-2xl md:text-3xl font-extrabold text-studio-textLightPrim dark:text-studio-textDarkPrim leading-none">${monthName} ${year}</h2>
              <p class="text-xs md:text-sm text-studio-textLightSec dark:text-studio-textDarkSec font-medium mt-2">Hai registrato ${lezioniMese} lezioni e caricato ${compitiMese} compiti in questo mese.</p>
            </div>

            <!-- Pulsanti Navigazione -->
            <div class="flex items-center space-x-2">
              <button onclick="navigateMonth(-1)" class="p-2 border border-studio-borderLight dark:border-studio-borderDark bg-studio-cardLight dark:bg-studio-cardDark rounded-xl hover:border-studio-accent hover:text-studio-accent transition-colors"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
              <button onclick="APP_STATE.currentCalendarMonth = new Date(); renderCalendar(document.getElementById('main-content'))" class="px-4 py-2 border border-studio-borderLight dark:border-studio-borderDark bg-studio-cardLight dark:bg-studio-cardDark rounded-xl text-xs font-bold hover:border-studio-accent hover:text-studio-accent transition-colors">Oggi</button>
              <button onclick="navigateMonth(1)" class="p-2 border border-studio-borderLight dark:border-studio-borderDark bg-studio-cardLight dark:bg-studio-cardDark rounded-xl hover:border-studio-accent hover:text-studio-accent transition-colors"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
            </div>
          </div>

          <!-- Layout Griglia Calendario (2 Colonne: Griglia + Pannello Dettagli) -->
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Colonna Griglia Principale (2/3 della larghezza) -->
            <div class="lg:col-span-2 bg-studio-cardLight dark:bg-studio-cardDark border border-studio-borderLight dark:border-studio-borderDark rounded-2xl p-5 md:p-6 shadow-sm space-y-4">
              
              <!-- Intestazione Giorni della Settimana (LUN-DOM) -->
              <div class="grid grid-cols-7 gap-2 text-center text-[10px] font-bold text-studio-textLightSec dark:text-studio-textDarkSec uppercase tracking-wider">
                <div>Lun</div>
                <div>Mar</div>
                <div>Mer</div>
                <div>Gio</div>
                <div>Ven</div>
                <div>Sab</div>
                <div>Dom</div>
              </div>

              <!-- Griglia dei Giorni -->
              <div id="calendar-days-grid" class="grid grid-cols-7 gap-2">
                <!-- Verranno generati dinamicamente -->
              </div>
            </div>

            <!-- Colonna Dettagli Giorno Selezionato (1/3 della larghezza) -->
            <div id="day-details-panel" class="bg-studio-cardLight dark:bg-studio-cardDark border border-studio-borderLight dark:border-studio-borderDark rounded-2xl p-5 md:p-6 shadow-sm">
              <!-- Verrà inserito dinamicamente da renderDayDetailsPanel() -->
            </div>
          </div>
        </div>
      `;

      // Generazione dinamica della griglia dei giorni
      const grid = document.getElementById('calendar-days-grid');
      let gridHTML = '';

      // 1. Giorni del mese precedente (inattivi)
      for (let i = adjustedFirstDayIndex - 1; i >= 0; i--) {
        const d = totalDaysInPrevMonth - i;
        gridHTML += `
          <div class="aspect-square flex items-center justify-center p-1 rounded-xl bg-studio-bgLight/20 dark:bg-studio-bgDark/20 border border-studio-borderLight/30 dark:border-studio-borderDark/30 text-studio-textLightSec/40 dark:text-studio-textDarkSec/30 text-xs font-semibold select-none cursor-not-allowed">
            ${d}
          </div>
        `;
      }

      // 2. Giorni del mese corrente
      const today = new Date();
      for (let day = 1; day <= totalDaysInMonth; day++) {
        const d = new Date(year, month, day);
        const dateStr = d.toISOString().split('T')[0];
        
        // Cerca attività per questa data
        const dayActivities = APP_STATE.activities.filter(a => a.date === dateStr);
        const hasLesson = dayActivities.some(a => a.isLessonDone);
        const hasHomework = dayActivities.some(a => a.isHomeworkUploaded);

        // Controllo se il giorno è quello attualmente selezionato
        const isSelected = 
          APP_STATE.selectedDate.getFullYear() === year &&
          APP_STATE.selectedDate.getMonth() === month &&
          APP_STATE.selectedDate.getDate() === day;

        // Controllo se il giorno è oggi
        const isToday = 
          today.getFullYear() === year &&
          today.getMonth() === month &&
          today.getDate() === day;

        let cellClasses = 'calendar-day-cell aspect-square flex flex-col justify-between p-2.5 rounded-xl border transition-all duration-200 cursor-pointer ';
        if (isSelected) {
          cellClasses += 'bg-studio-accent text-white border-studio-accent shadow-md scale-105 ';
        } else {
          cellClasses += 'bg-studio-cardLight dark:bg-studio-cardDark border-studio-borderLight dark:border-studio-borderDark hover:border-studio-accent/40 ';
          if (isToday) {
            cellClasses += 'ring-2 ring-studio-accent ring-offset-2 dark:ring-offset-studio-cardDark ';
          }
        }

        // Costruisci pallini indicatori
        let dotsHTML = '';
        if (dayActivities.length > 0) {
          dotsHTML = '<div class="flex items-center justify-center space-x-1.5 mt-1">';
          if (hasLesson) {
            dotsHTML += `<span class="w-1.5 h-1.5 rounded-full ${isSelected ? 'bg-white' : 'bg-studio-accent'}"></span>`;
          }
          if (hasHomework) {
            dotsHTML += `<span class="w-1.5 h-1.5 rounded-full ${isSelected ? 'bg-amber-200' : 'bg-amber-500'}"></span>`;
          }
          dotsHTML += '</div>';
        }

        gridHTML += `
          <div id="cal-cell-${year}-${month}-${day}" onclick="selectDate(${year}, ${month}, ${day})" class="${cellClasses}">
            <span class="text-xs font-bold ${isSelected ? 'text-white' : 'text-studio-textLightPrim dark:text-studio-textDarkPrim'}">${day}</span>
            ${dotsHTML}
          </div>
        `;
      }

      // 3. Giorni del mese successivo (inattivi per riempire la griglia 42 celle standard)
      const totalCellsInGrid = adjustedFirstDayIndex + totalDaysInMonth;
      const remainingCells = 42 - totalCellsInGrid;
      for (let day = 1; day <= remainingCells; day++) {
        gridHTML += `
          <div class="aspect-square flex items-center justify-center p-1 rounded-xl bg-studio-bgLight/20 dark:bg-studio-bgDark/20 border border-studio-borderLight/30 dark:border-studio-borderDark/30 text-studio-textLightSec/40 dark:text-studio-textDarkSec/30 text-xs font-semibold select-none cursor-not-allowed">
            ${day}
          </div>
        `;
      }

      grid.innerHTML = gridHTML;

      // Carica dettagli giorno selezionato
      renderDayDetailsPanel();
      
      // Inizializza icone Lucide
      lucide.createIcons();
    }

      dlAnchorElem.setAttribute("href", dataStr);

    function deleteActivity(id) {
      if (confirm("Sei sicuro di voler eliminare questa sessione di studio? La cancellazione è irreversibile.")) {
        APP_STATE.activities = APP_STATE.activities.filter(a => a.id !== id);
        saveStateToLocalStorage();
        showToast("Sessione eliminata dal database local.");
        
        // Se eliminiamo e siamo nel calendario o archivio, ri-renderizza per aggiornare in tempo reale
        renderActiveTab();
      }

    function renderArchiveTableRows() {
      const tbody = document.getElementById('archive-table-body');
      if (!tbody) return;

      // Applica filtri
      let filtered = APP_STATE.activities.filter(a => {
        // Filtro di ricerca testuale
        const matchesSearch = 
          a.topic.toLowerCase().includes(APP_STATE.filters.searchQuery) ||
          a.notes.toLowerCase().includes(APP_STATE.filters.searchQuery) ||
          (a.description && a.description.toLowerCase().includes(APP_STATE.filters.searchQuery)) ||
          a.tags.some(t => t.toLowerCase().includes(APP_STATE.filters.searchQuery));

        // Filtro categoria
        const matchesCategory = 
          APP_STATE.filters.category === 'ALL' || 
          a.category === APP_STATE.filters.category;

        // Filtro date limiti
        let matchesDates = true;
        if (APP_STATE.filters.startDate) {
          matchesDates = matchesDates && (a.date >= APP_STATE.filters.startDate);
        }
        if (APP_STATE.filters.endDate) {
          matchesDates = matchesDates && (a.date <= APP_STATE.filters.endDate);
        }

        return matchesSearch && matchesCategory && matchesDates;
      });

      // Ordinamento cronologico decrescente (da più recente a meno recente)
      filtered.sort((a, b) => b.date.localeCompare(a.date));

      const totalItems = filtered.length;
      
      // Imposta paginazione
      const totalPages = Math.ceil(totalItems / APP_STATE.pagination.itemsPerPage) || 1;
      if (APP_STATE.pagination.currentPage > totalPages) {
        APP_STATE.pagination.currentPage = totalPages;
      }
      
      const startIndex = (APP_STATE.pagination.currentPage - 1) * APP_STATE.pagination.itemsPerPage;
      const endIndex = Math.min(startIndex + APP_STATE.pagination.itemsPerPage, totalItems);
      const paginatedItems = filtered.slice(startIndex, endIndex);

      // Rendering count label
      const counterLabel = document.getElementById('archive-counter-label');
      if (counterLabel) {
        counterLabel.innerText = `Mostrando ${totalItems > 0 ? startIndex + 1 : 0}-${endIndex} di ${totalItems} elementi`;
      }

      // Render Pagination Buttons
      const pagContainer = document.getElementById('archive-pagination-container');
      if (pagContainer) {
        let pagHTML = `
          <button onclick="changePage(${APP_STATE.pagination.currentPage - 1})" ${APP_STATE.pagination.currentPage === 1 ? 'disabled' : ''} 
                  class="p-2 border border-studio-borderLight dark:border-studio-borderDark rounded-lg hover:border-studio-accent transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
            <i data-lucide="chevron-left" class="w-4 h-4"></i>
          </button>
        `;

        for (let p = 1; p <= totalPages; p++) {
          pagHTML += `
            <button onclick="changePage(${p})" 
                    class="px-3.5 py-1.5 border border-studio-borderLight dark:border-studio-borderDark rounded-lg text-xs font-bold transition-colors ${APP_STATE.pagination.currentPage === p ? 'bg-studio-accent text-white border-studio-accent shadow-sm' : 'bg-studio-cardLight dark:bg-studio-cardDark text-studio-textLightSec dark:text-studio-textDarkSec hover:border-studio-accent'}">
              ${p}
            </button>
          `;
        }

        pagHTML += `
          <button onclick="changePage(${APP_STATE.pagination.currentPage + 1})" ${APP_STATE.pagination.currentPage === totalPages ? 'disabled' : ''} 
                  class="p-2 border border-studio-borderLight dark:border-studio-borderDark rounded-lg hover:border-studio-accent transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
            <i data-lucide="chevron-right" class="w-4 h-4"></i>
          </button>
        `;
        pagContainer.innerHTML = pagHTML;
      }

      if (paginatedItems.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="5" class="px-6 py-12 text-center text-xs font-semibold text-studio-textLightSec dark:text-studio-textDarkSec">
              Nessuna sessione di studio registrata soddisfa i criteri di ricerca impostati.
            </td>
          </tr>
        `;
        lucide.createIcons();
        return;
      }

      tbody.innerHTML = paginatedItems.map(a => {
        let categoryBadgeColor = '';
        if (a.category === 'AI-web-development') {
          categoryBadgeColor = 'bg-amber-100 text-amber-800 dark:bg-amber-950/40 dark:text-amber-300';
        } else {
          categoryBadgeColor = 'bg-studio-accentLight text-studio-accent dark:bg-[#2C2117] dark:text-[#E2C7A8]';
        }

        return `
          <tr class="hover:bg-studio-bgLight/20 dark:hover:bg-studio-bgDark/20 transition-colors">
            
            <!-- TITOLO -->
            <td class="px-6 py-4">
              <div class="flex items-center space-x-3">
                <div class="w-8.5 h-8.5 rounded-lg bg-studio-accentLight/60 dark:bg-[#2C2117] text-studio-accent dark:text-[#E2C7A8] flex items-center justify-center shrink-0 shadow-sm">
                  <i data-lucide="book-open" class="w-4.5 h-4.5"></i>
                </div>
                <div class="leading-none">
                  <div class="flex items-center gap-1.5">
                    <span class="text-xs font-extrabold text-studio-textLightPrim dark:text-studio-textDarkPrim block truncate max-w-[200px]" title="${a.topic}">${a.topic}</span>
                    ${a.attachment ? `
                      <button onclick="downloadAttachment('${a.id}')" class="text-studio-accent hover:text-studio-accentHover shrink-0" title="Scarica allegato: ${a.attachment.name}">
                        <i data-lucide="paperclip" class="w-3.5 h-3.5"></i>
                      </button>
                    ` : ''}
                  </div>
                  <span class="text-[9px] text-studio-textLightSec dark:text-studio-textDarkSec font-semibold mt-1 block max-w-sm line-clamp-1">${a.notes || 'Note non presenti.'}</span>
                </div>
              </div>
            </td>

            <!-- DATA -->
            <td class="px-6 py-4 text-xs font-bold text-studio-textLightSec dark:text-studio-textDarkSec">
              ${formatDateString(a.date)}
            </td>

            <!-- CATEGORIA -->
            <td class="px-6 py-4">
              <span class="text-[9px] font-extrabold px-2 py-0.5 rounded-full ${categoryBadgeColor}">
                ${a.category}
              </span>
            </td>

            <!-- STATUS -->
            <td class="px-6 py-4">
              <div class="flex items-center space-x-3">
                <div class="flex items-center space-x-1.5" title="${a.isLessonDone ? 'Lezione completata' : 'In attesa'}">
                  <i data-lucide="${a.isLessonDone ? 'check-circle-2' : 'circle'}" class="w-4 h-4 ${a.isLessonDone ? 'text-studio-accent' : 'text-stone-300 dark:text-stone-700'}"></i>
                  <span class="text-[10px] font-semibold text-studio-textLightSec dark:text-studio-textDarkSec">Lezione</span>
                </div>
                <div class="flex items-center space-x-1.5" title="${a.isHomeworkUploaded ? 'Compito consegnato' : 'In attesa'}">
                  <i data-lucide="${a.isHomeworkUploaded ? 'check-circle-2' : 'circle'}" class="w-4 h-4 ${a.isHomeworkUploaded ? 'text-amber-500' : 'text-stone-300 dark:text-stone-700'}"></i>
                  <span class="text-[10px] font-semibold text-studio-textLightSec dark:text-studio-textDarkSec">Compito</span>
                </div>
              </div>
            </td>

            <!-- AZIONI -->
            <td class="px-6 py-4 text-right">
              <div class="flex items-center justify-end space-x-2">
                <button onclick="openModal('${a.id}')" class="p-1.5 rounded hover:bg-studio-accentLight dark:hover:bg-[#2C2117] text-studio-accent" title="Modifica"><i data-lucide="edit" class="w-4 h-4"></i></button>
                <button onclick="deleteActivity('${a.id}')" class="p-1.5 rounded hover:bg-red-500/10 text-red-500" title="Elimina"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
              </div>
            </td>

          </tr>
        `;
      }).join('');
      lucide.createIcons();
    }

    // =========================================================================
    function handleFileSelection(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      const maxBytes = 2 * 1024 * 1024; // 2MB
      const isTooLarge = file.size > maxBytes;
      
      const reader = new FileReader();
      reader.onload = function(evt) {
        const attachment = {
          name: file.name,
          size: formatBytes(file.size),
          type: file.type,
          data: evt.target.result // Stringa Base64 (DataURL)
        };
        
        if (isTooLarge) {
          showToast("File superiore a 2MB. Verrà registrato il nome, ma il file non sarà salvato offline.");
          attachment.data = ""; // Non salvare il corpo binario enorme per non intasare localStorage
        }
        
        APP_STATE.currentAttachment = attachment;
        renderFilePreview();
      };
      reader.readAsDataURL(file);
    }
    
    function removeAttachedFile(e) {
      if (e) e.stopPropagation();
      APP_STATE.currentAttachment = null;
      document.getElementById('file-input').value = '';
      renderFilePreview();
    }
    
    function renderFilePreview() {
      const prompt = document.getElementById('dropzone-prompt');
      const preview = document.getElementById('file-preview');
      
      if (APP_STATE.currentAttachment) {
        prompt.classList.add('hidden');
        preview.classList.remove('hidden');
        document.getElementById('file-preview-name').innerText = APP_STATE.currentAttachment.name;
        document.getElementById('file-preview-name').title = APP_STATE.currentAttachment.name;
        document.getElementById('file-preview-size').innerText = APP_STATE.currentAttachment.size;
        
        const iconEl = document.getElementById('file-preview-icon');
        const iconName = getIconForAttachment(APP_STATE.currentAttachment.name);
        iconEl.setAttribute('data-lucide', iconName);
        lucide.createIcons();
      } else {
        prompt.classList.remove('hidden');
        preview.classList.add('hidden');
        document.getElementById('file-input').value = '';
      }
    }
    
    function formatBytes(bytes, decimals = 1) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const dm = decimals < 0 ? 0 : decimals;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }
    
    function getIconForAttachment(filename) {
      const ext = filename.split('.').pop().toLowerCase();
      if (['pdf'].includes(ext)) return 'file-text';
      if (['pptx', 'ppt', 'key'].includes(ext)) return 'presentation';
      if (['png', 'jpg', 'jpeg', 'gif', 'svg', 'webp'].includes(ext)) return 'image';
      if (['js', 'css', 'html', 'py', 'json', 'ts', 'java', 'cpp', 'c', 'sh'].includes(ext)) return 'code-2';
      if (['zip', 'rar', 'tar', 'gz', '7z'].includes(ext)) return 'archive';
      return 'file';
    }
    
    function downloadAttachment(activityId) {
      const act = APP_STATE.activities.find(a => a.id === activityId);
      if (!act || !act.attachment) return;
      
      const att = act.attachment;
      if (!att.data) {
        showToast("Il file non è salvato offline perché superava i 2MB.");
        return;
      }
      
      const dlAnchor = document.createElement('a');
      dlAnchor.setAttribute("href", att.data);
      dlAnchor.setAttribute("download", att.name);
      dlAnchor.click();
      showToast(`Download avviato: ${att.name}`);
    }

    function setRating(val) {
      APP_STATE.rating = val;
      for (let i = 1; i <= 5; i++) {
        const star = document.getElementById(`star-${i}`);
        if (!star) continue;
        if (i <= val) {
          star.classList.add('fill-current', 'text-amber-500');
          star.classList.remove('text-stone-300', 'dark:text-stone-700');
        } else {
          star.classList.remove('fill-current', 'text-amber-500');
          star.classList.add('text-stone-300', 'dark:text-stone-700');
        }
      }
    }

    function openModal(activityId = null, prefilledDate = null) {
      const container = document.getElementById('modal-container');
      const form = document.getElementById('activity-form');
      const title = document.getElementById('modal-title');
      const icon = document.getElementById('modal-icon');
      
      form.reset();
      
      // Imposta data odierna come default
      const dateEl = document.getElementById('date');
      const todayStr = new Date().toISOString().split('T')[0];
      dateEl.value = todayStr;

      if (prefilledDate) {
        dateEl.value = prefilledDate;
      }

      if (activityId) {
        // MODALITÀ MODIFICA
        title.innerText = "Modifica Sessione di Studio";
        document.getElementById('activity-id').value = activityId;
        
        const act = APP_STATE.activities.find(a => a.id === activityId);
        if (act) {
          document.getElementById('topic').value = act.topic;
          document.getElementById('date').value = act.date;
          document.getElementById('category').value = act.category;
          document.getElementById('isLessonDone').checked = act.isLessonDone;
          document.getElementById('isHomeworkUploaded').checked = act.isHomeworkUploaded;
          document.getElementById('platformLink').value = act.platformLink || '';
          document.getElementById('notes').value = act.notes || '';
          document.getElementById('description').value = act.description || '';
          document.getElementById('tags').value = act.tags ? act.tags.join(', ') : '';
          setRating(act.rating);
          APP_STATE.currentAttachment = act.attachment || null;
        }
      } else {
        // MODALITÀ INSERIMENTO NUOVO
        title.innerText = "Registra Nuova Lezione";
        document.getElementById('activity-id').value = '';
        setRating(5); // Autovalutazione di default 5
        APP_STATE.currentAttachment = null;
      }
      renderFilePreview();

      // Mostra modale con transizione fade ed effetto scala
      container.classList.remove('hidden');
      setTimeout(() => {
        container.classList.remove('opacity-0');
        container.querySelector('div').classList.remove('scale-95');
        container.querySelector('div').classList.add('scale-100');
      }, 50);
      
      // Inizializza icone Lucide interne al modale
      lucide.createIcons();
    }

    function closeModal() {
      const container = document.getElementById('modal-container');
      container.querySelector('div').classList.remove('scale-100');
      container.querySelector('div').classList.add('scale-95');
      container.classList.add('opacity-0');
      
      setTimeout(() => {
        container.classList.add('hidden');
      }, 300);
    }

    function saveActivity(event) {
      event.preventDefault();
      
      const id = document.getElementById('activity-id').value;
      const topic = document.getElementById('topic').value.trim();
      const date = document.getElementById('date').value;
      const category = document.getElementById('category').value;
      const isLessonDone = document.getElementById('isLessonDone').checked;
      const isHomeworkUploaded = document.getElementById('isHomeworkUploaded').checked;
      const platformLink = document.getElementById('platformLink').value.trim();
      const notes = document.getElementById('notes').value.trim();
      const description = document.getElementById('description').value.trim();
      const tagsStr = document.getElementById('tags').value.trim();
      
      // Parsing dei tag separati da virgola
      const tags = tagsStr ? tagsStr.split(',').map(t => t.trim().toLowerCase()).filter(t => t) : [];

      if (!topic || !date) {
        showToast("Errore: Compila tutti i campi obbligatori contrassegnati con l'asterisco.");
        return;
      }

      const activityData = {
        topic,
        date,
        category,
        isLessonDone,
        isHomeworkUploaded,
        platformLink,
        notes,
        description,
        tags,
        rating: APP_STATE.rating,
        attachment: APP_STATE.currentAttachment
      };

      if (id) {
        // MODIFICA ATTIVITÀ
        const index = APP_STATE.activities.findIndex(a => a.id === id);
        if (index !== -1) {
          APP_STATE.activities[index] = { ...APP_STATE.activities[index], ...activityData };
          showToast("Sessione di studio modificata con successo!");
        }
      } else {
        // AGGIUNTA NUOVA
        const newActivity = {
          id: 'activity-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9),
          ...activityData
        };
        APP_STATE.activities.push(newActivity);
        showToast("Nuova lezione registrata nel Centro di Controllo!");
      }

      // Salva lo stato modificato localmente
      saveStateToLocalStorage();
      
      // Chiudi il modale
      closeModal();
      
      // Se il giorno modificato/aggiunto è diverso, aggiorna selectedDate
      const parts = date.split('-');
      APP_STATE.selectedDate = new Date(parts[0], parts[1] - 1, parts[2]);
      APP_STATE.currentCalendarMonth = new Date(parts[0], parts[1] - 1, 1);

      // Aggiorna la vista dinamica in esecuzione
      renderActiveTab();
    }


    // =========================================================================
    // INIZIALIZZAZIONE GLOBALE DELL'APPLICAZIONE (DOM READY)
    // =========================================================================
    window.addEventListener('DOMContentLoaded', () => {
      // 1. Carica lo stato e mock
      initAppState();

      // 2. Rendi attiva la prima vista (Dashboard)
      switchTab('dashboard');

      // 3. Ascolta click esterno al modale per chiuderlo
      const modalEl = document.getElementById('modal-container');
      modalEl.addEventListener('click', closeModal);
    });
  </script>
</body>
